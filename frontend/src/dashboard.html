<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sol-Manager | Panel Principal</title>
  <link rel="stylesheet" href="styles.css">
  
</head>
<body>

  <div class="dashboard-container">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">☀️ Sol-Manager</div>
        <div class="currency-badge" id="rateBadge">USD 42.50 VES | EUR 45.80</div>
      </div>
      
      <nav class="sidebar-menu">
        <button class="menu-btn active"><span>🏠</span> Home</button>
        <button class="menu-btn"><span>📦</span> Mis Pedidos</button>
        <button class="menu-btn"><span>📂</span> Catálogo</button>
        <button class="menu-btn"><span>🛒</span> Carrito de compra</button>
        <button class="menu-btn"><span>⚙️</span> Configuración</button>
        <button class="menu-btn"><span>🚚</span> Rastreo de delivery</button>
      </nav>

      <div class="sidebar-footer">
        <div class="user-info" id="sidebarUserName">Cargando...</div>
        <div class="user-role" id="sidebarUserRole">...</div>
        <a id="btnLogout" class="logout-link">Cerrar Sesión</a>
      </div>
    </aside>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="main-content">
      <!-- HEADER SUPERIOR -->
      <header class="top-header">
        <div class="search-container">
          <span style="padding: var(--spacing-sm) 0 var(--spacing-sm) var(--spacing-md);">🔍</span>
          <input type="text" id="searchInput" placeholder="Buscar productos (ej. arroz, carne, leche)..." class="search-input">
        </div>
        <div class="header-right">
          <button id="btnSearch" class="btn-search">Buscar</button>
          <button id="themeToggle" class="theme-toggle">Modo oscuro</button>
        </div>
      </header>

      <!-- CUERPO DE CONTENIDO -->
      <div class="content-body">
        <!-- Panel exclusivo para Administradores (Dinámico) -->
        <div id="adminPanelArea" class="admin-actions" style="display: none;">
          <h2>Gestión de Inventario (Vista Admin)</h2>
          <button class="btn-admin-add" onclick="alert('Funcionalidad demo: Agregar nuevo producto')">+ Nuevo Producto</button>
        </div>

        <!-- Rejilla de Productos -->
        <div class="product-grid" id="productGridContainer">
          <!-- Inyectado por JS -->
        </div>
      </div>
    </main>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
