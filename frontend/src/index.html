<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Sol-Manager | Acceso y Registro</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <button id="themeToggle" class="theme-toggle"> Modo oscuro</button>

  <div class="auth-card">
    <div class="card-header">
      <div class="logo">☀️ Sol-Manager</div>
      <div class="subtitle">Accede a tu cuenta o crea una nueva</div>
    </div>

    <div class="tabs">
      <button id="tabLogin" class="tab-btn active">Ingresar</button>
      <button id="tabRegister" class="tab-btn">Registrarse</button>
    </div>

    <div class="auth-content">
      <!-- Formulario de Login -->
      <div id="loginForm">
        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" id="loginEmail" placeholder="">
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="loginPassword" placeholder="">
        </div>
        <button id="doLogin" class="btn-primary">Ingresar</button>
        <div class="extra-links">
          ¿Olvidaste tu contraseña? <a id="forgotLink">Recuperar</a>
        </div>
      </div>

      <!-- Formulario de Registro (inicialmente oculto) -->
      <div id="registerForm" style="display: none;">
        <div class="form-group">
          <label>Nombre completo</label>
          <input type="text" id="regName" placeholder="Ej: Juan Pérez" maxlength="100">
        </div>
        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" id="regEmail" placeholder="tucorreo@ejemplo.com">
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="regPassword" placeholder="Crea una contraseña segura">
        </div>
        <button id="doRegister" class="btn-primary">Registrarse</button>
        <div class="extra-links">
          Al registrarte aceptas nuestros <a>términos y condiciones</a>.
        </div>
      </div>

      <div id="messageArea" class="message" style="display: none;"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
